<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="在 Wikipedia 文章之間尋找最短路線的導航遊戲。">
  <title>Wikipedia Race</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
  <main class="landing-card">
    <p class="eyebrow">Wiki navigation challenge</p>
    <h1>Wikipedia Race</h1>
    <p class="lead">從隨機文章出發，只能點擊頁面內的連結，看看你能多快抵達目標。</p>
    <button id="start-button" class="primary-button" type="button">開始新遊戲</button>
    <p id="start-status" class="status" role="status" aria-live="polite"></p>
  </main>
  <script src="index.js" defer></script>
</body>
</html>
